<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="WDD 131 - Product Review form where customers can rate and review a product, by Charlie Woollard.">
    <meta name="author" content="Charlie Woollard">
    <title>Product Review - Charlie Woollard</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <p class="note">* Required</p>

            <label for="product">Product Name *</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset class="rating">
                <legend>Overall Rating *</legend>
                <input type="radio" id="rating1" name="rating" value="1" required>
                <label for="rating1">&star;</label>
                <input type="radio" id="rating2" name="rating" value="2" required>
                <label for="rating2">&star;&star;</label>
                <input type="radio" id="rating3" name="rating" value="3" required>
                <label for="rating3">&star;&star;&star;</label>
                <input type="radio" id="rating4" name="rating" value="4" required>
                <label for="rating4">&star;&star;&star;&star;</label>
                <input type="radio" id="rating5" name="rating" value="5" required>
                <label for="rating5">&star;&star;&star;&star;&star;</label>
            </fieldset>

            <label for="installdate">Date of Installation *</label>
            <input type="date" id="installdate" name="installdate" required>

            <fieldset class="features">
                <legend>Useful Features</legend>
                <div>
                    <input type="checkbox" id="durability" name="feature" value="durability">
                    <label for="durability">Durability</label>
                </div>
                <div>
                    <input type="checkbox" id="ease" name="feature" value="ease of use">
                    <label for="ease">Ease of Use</label>
                </div>
                <div>
                    <input type="checkbox" id="performance" name="feature" value="performance">
                    <label for="performance">Performance</label>
                </div>
                <div>
                    <input type="checkbox" id="design" name="feature" value="design">
                    <label for="design">Design</label>
                </div>
            </fieldset>

            <label for="review">Written Review</label>
            <textarea id="review" name="review" rows="6"></textarea>

            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Charlie Woollard · Manchester, England</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
